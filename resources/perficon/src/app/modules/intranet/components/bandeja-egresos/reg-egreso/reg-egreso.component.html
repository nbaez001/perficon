<ng4-loading-spinner [timeout]="300000"></ng4-loading-spinner>
<h5 mat-dialog-title>{{data.title}}</h5>
<div mat-dialog-content>
  <form [formGroup]="formularioGrp">
    <mat-grid-list cols="12" rowHeight="50px">
      <mat-grid-tile [responsiveRows]="{xs: 12, sm: 6, md: 6, lg: 6, xl: 6}">
        <div *ngIf="listaWallet.length<=0 && listaCuentaBanco.length<=0" class="spinerTable">
          <mat-progress-spinner [diameter]="25" color="primary" mode="indeterminate">
          </mat-progress-spinner>
        </div>
        <mat-radio-group *ngIf="listaWallet.length>0 || listaCuentaBanco.length>0" aria-label="Seleccione una opcion"
          formControlName="cuenta">
          <mat-radio-button [value]="listaWallet[0]" *ngIf="listaWallet.length>0" (click)="cambiarCuenta(0)"
            (dblclick)="toggleCuenta(listaWallet)">{{listaWallet[0].nombre}}</mat-radio-button>
          <mat-radio-button [value]="listaCuentaBanco[0]" *ngIf="listaCuentaBanco.length>0" (click)="cambiarCuenta(1)"
            (dblclick)="toggleCuenta(listaCuentaBanco)">{{listaCuentaBanco[0].nombre}}</mat-radio-button>
        </mat-radio-group>
      </mat-grid-tile>
      <mat-grid-tile [responsiveRows]="{xs: 12, sm: 6, md: 6, lg: 6, xl: 6}">
        <mat-form-field>
          <mat-label>Categoria egreso</mat-label>
          <mat-select formControlName="categoriaEgreso">
            <mat-option *ngFor="let categoriaEgreso of categoriasEgreso" [value]="categoriaEgreso">
              {{categoriaEgreso.nombre}}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </mat-grid-tile>
      <mat-grid-tile [responsiveRows]="{xs: 12, sm: 6, md: 6, lg: 6, xl: 6}">
        <button mat-raised-button color="primary" type="button" (click)="regDetEgreso()">Agregar</button>
      </mat-grid-tile>
    </mat-grid-list>
  </form>
  <div class="table-container clear-both">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> N° </th>
        <td mat-cell *matCellDef="let row; let i=index">
          {{(row.id?(paginator.pageSize * paginator.pageIndex + i + 1):'')}}
        </td>
      </ng-container>

      <ng-container *ngFor="let column of columnsGrilla" [matColumnDef]="column.columnDef">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> {{ column.header }} </th>
        <td mat-cell *matCellDef="let row"> {{ column.cell(row) }} </td>
      </ng-container>

      <ng-container matColumnDef="opt" stickyEnd>
        <th mat-header-cell *matHeaderCellDef>Opt.</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button matTooltip="Editar egreso" (click)="editEgreso(element)" *ngIf="element.editar">
            <mat-icon>create</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" [ngClass]="{'sobresaltarUltimo' : row.id==null}">
      </tr>

    </table>

    <div class="empty" *ngIf="dataSource === null || dataSource.length <= 0">
      No existe datos para mostrar en la tabla
    </div>

    <mat-paginator class="mat-paginator-sticky" [pageSizeOptions]="[5, 10, 25, 100]" showFirstLastButtons>
    </mat-paginator>
  </div>
</div>
<div mat-dialog-actions align="center">
  <button mat-raised-button color="primary" type="button" (click)="editEgreso()" *ngIf="data.objeto">Modificar</button>
  <button mat-raised-button color="primary" type="button" (click)="regEgreso()" *ngIf="!data.objeto">Guardar</button>
  <button mat-button [mat-dialog-close]="" cdkFocusInitial>Salir</button>
</div>

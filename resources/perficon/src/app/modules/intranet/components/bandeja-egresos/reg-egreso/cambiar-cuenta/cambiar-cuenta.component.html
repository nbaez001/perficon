<ng4-loading-spinner [timeout]="300000"></ng4-loading-spinner>
<h5 mat-dialog-title>{{data.title}}</h5>
<div mat-dialog-content>
  <form [formGroup]="formularioGrp">
    <mat-grid-list cols="12" rowHeight="50px">
      <mat-grid-tile [responsiveRows]="{xs: 12, sm: 12, md: 12, lg: 12, xl: 12}">
        <mat-radio-group aria-label="Seleccione una opcion" formControlName="cuenta">
          <mat-radio-button *ngFor="let cuenta of data.objeto" [value]="cuenta">{{cuenta.nombre}}</mat-radio-button>
        </mat-radio-group>
      </mat-grid-tile>
    </mat-grid-list>
  </form>
</div>
<div mat-dialog-actions align="center">
  <button mat-raised-button color="primary" type="button" (click)="guardar()">Guardar</button>
  <button mat-button [mat-dialog-close]="data.objeto" cdkFocusInitial>Salir</button>
</div>
